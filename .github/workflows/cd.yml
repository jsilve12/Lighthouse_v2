# cd.yml
#
# Required GitHub secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT_EMAIL      — SA with Artifact Registry push + GKE deploy roles
#
# Required GitHub Actions variables (non-secret):
#   GCP_PROJECT_ID    — e.g. personal-project-289714
#   GKE_CLUSTER_NAME  — e.g. cluster

name: Lighthouse — CD

on:
  workflow_run:
    workflows: ["Lighthouse — CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: lighthouse-deploy
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1a — Build & push API image
  # ---------------------------------------------------------------------------
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_NAME: lighthouse/api
      REGISTRY_HOST: us-central1-docker.pkg.dev

    outputs:
      image_digest: ${{ steps.capture-digest.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          audience: https://github.com/${{ github.repository_owner }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGISTRY_HOST }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            backend/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Capture image digest
        id: capture-digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            | cut -d'@' -f2)
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "ERROR: Unexpected digest format: $DIGEST"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 1b — Build & push frontend image
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_NAME: lighthouse/frontend
      REGISTRY_HOST: us-central1-docker.pkg.dev

    outputs:
      image_digest: ${{ steps.capture-digest.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          audience: https://github.com/${{ github.repository_owner }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGISTRY_HOST }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            frontend/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Capture image digest
        id: capture-digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            | cut -d'@' -f2)
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "ERROR: Unexpected digest format: $DIGEST"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 2 — Pin digests in manifests and deploy to GKE
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    permissions:
      contents: write
      id-token: write

    env:
      REGISTRY_HOST: us-central1-docker.pkg.dev
      GKE_LOCATION: us-central1

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          audience: https://github.com/${{ github.repository_owner }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Pin API image digest in manifest
        env:
          NEW_DIGEST: ${{ needs.build-api.outputs.image_digest }}
        run: |
          MANIFEST="k8s/deployment.yaml"
          IMAGE_BASE="${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/lighthouse/api"
          sed -i "s|image: ${IMAGE_BASE}[^ ]*|image: ${IMAGE_BASE}@${NEW_DIGEST}|" "$MANIFEST"
          echo "Updated API manifest:"
          grep "image:.*lighthouse/api" "$MANIFEST"

      - name: Pin frontend image digest in manifest
        env:
          NEW_DIGEST: ${{ needs.build-frontend.outputs.image_digest }}
        run: |
          MANIFEST="k8s/frontend-deployment.yaml"
          IMAGE_BASE="${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/lighthouse/frontend"
          sed -i "s|image: ${IMAGE_BASE}[^ ]*|image: ${IMAGE_BASE}@${NEW_DIGEST}|" "$MANIFEST"
          echo "Updated frontend manifest:"
          grep "image:.*lighthouse/frontend" "$MANIFEST"

      - name: Commit updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml k8s/frontend-deployment.yaml

          if git diff --staged --quiet; then
            echo "Manifests unchanged, skipping commit."
          else
            git commit -m "chore: pin lighthouse images to ${{ github.sha }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Apply manifests
        run: |
          kubectl apply \
            -f k8s/deployment.yaml \
            -f k8s/frontend-deployment.yaml \
            -n lighthouse

      - name: Wait for API rollout
        run: kubectl rollout status deployment/lighthouse-api -n lighthouse --timeout=300s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/lighthouse-frontend -n lighthouse --timeout=300s
