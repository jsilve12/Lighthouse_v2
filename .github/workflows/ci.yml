# ci.yml
#
# Required GitHub secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT_EMAIL      — SA with Artifact Registry push + GKE deploy roles
#
# Required GitHub Actions variables (non-secret):
#   GCP_PROJECT_ID    — e.g. personal-project-289714
#   GKE_CLUSTER_NAME  — e.g. cluster

name: Lighthouse — CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Security scan + compliance score
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      score: ${{ steps.score.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps and security tools
        run: |
          pip install hatchling
          cd backend && pip install ".[dev]"
          pip install bandit pip-audit

      - name: Run Bandit
        run: cd backend && bandit -r src/ -f json -o /tmp/bandit-report.json || true

      - name: Run pip-audit
        run: pip-audit --format json --output /tmp/pip-audit.json || true

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run npm audit
        run: cd frontend && npm audit --audit-level=moderate --json > /tmp/npm-audit.json 2>&1 || true

      - name: Compute security score
        id: score
        run: |
          SCORE=$(python3 << 'PYEOF'
          import json, sys

          score = 100
          bandit_issues = []
          try:
              with open('/tmp/bandit-report.json') as f:
                  data = json.load(f)
                  for r in data.get('results', []):
                      sev = r.get('issue_severity', '')
                      if sev == 'HIGH':
                          score -= 10
                          bandit_issues.append(f"HIGH: {r.get('issue_text', '')} ({r.get('filename', '')}:{r.get('line_number', '')})")
                      elif sev == 'MEDIUM':
                          score -= 5
                          bandit_issues.append(f"MEDIUM: {r.get('issue_text', '')} ({r.get('filename', '')}:{r.get('line_number', '')})")
          except (FileNotFoundError, json.JSONDecodeError):
              pass

          pip_vulns = 0
          try:
              with open('/tmp/pip-audit.json') as f:
                  data = json.load(f)
                  pip_vulns = len(data.get('dependencies', []))
                  score -= pip_vulns * 5
          except (FileNotFoundError, json.JSONDecodeError):
              pass

          npm_high, npm_mod = 0, 0
          try:
              with open('/tmp/npm-audit.json') as f:
                  data = json.load(f)
                  vulns = data.get('metadata', {}).get('vulnerabilities', {})
                  npm_high = vulns.get('high', 0)
                  npm_mod = vulns.get('moderate', 0)
                  score -= npm_high * 10
                  score -= npm_mod * 3
          except (FileNotFoundError, json.JSONDecodeError):
              pass

          score = max(0, score)

          if bandit_issues:
              print("Bandit issues:")
              for issue in bandit_issues:
                  print(f"  - {issue}")
          if pip_vulns:
              print(f"pip-audit vulnerabilities: {pip_vulns}")
          if npm_high or npm_mod:
              print(f"npm audit: {npm_high} high, {npm_mod} moderate")

          if score < 70:
              print(f"FAIL: Security score {score}/100 is below threshold of 70")
              sys.exit(1)
          print(f"PASS: Security score {score}/100")
          PYEOF
          )
          echo "$SCORE"
          # Extract numeric score for output
          NUMERIC=$(echo "$SCORE" | grep -oP '\d+(?=/100)' | tail -1)
          echo "score=${NUMERIC}" >> "$GITHUB_OUTPUT"

      - name: Post score to summary
        if: always()
        run: |
          echo "## Security Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "Score: **${{ steps.score.outputs.score }}/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Python) | $([ -f /tmp/bandit-report.json ] && echo 'Ran' || echo 'Skipped') |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | $([ -f /tmp/pip-audit.json ] && echo 'Ran' || echo 'Skipped') |" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | $([ -f /tmp/npm-audit.json ] && echo 'Ran' || echo 'Skipped') |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 2 — Lint + typecheck
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint backend
        run: |
          pip install ruff
          cd backend
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Lint and typecheck frontend
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 3 — Backend tests
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lighthouse
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: lighthouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LIGHTHOUSE_DB_HOST: localhost
      LIGHTHOUSE_DB_PORT: "5432"
      LIGHTHOUSE_DB_NAME: lighthouse
      LIGHTHOUSE_DB_USER: lighthouse
      LIGHTHOUSE_DB_PASSWORD: testpassword
      LIGHTHOUSE_JWT_SECRET_KEY: test-secret-key-for-ci
      LIGHTHOUSE_ENVIRONMENT: test
      PYTHONPATH: backend/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          pip install hatchling
          cd backend && pip install ".[dev]"
      - name: Create tables and run tests
        run: |
          cd backend
          python -c "
          from lighthouse_api.models import Base
          from lighthouse_api.core.config import settings
          from sqlalchemy import create_engine
          eng = create_engine(settings.database_url_sync)
          Base.metadata.create_all(eng)
          "
          pytest tests/ -v --cov=lighthouse_api || true

  # ---------------------------------------------------------------------------
  # Job 4 — Frontend build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build
