apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lighthouse-ingress
  namespace: lighthouse
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - lighthouse.jonathansilverstein.us
      secretName: lighthouse-tls
  rules:
    - host: lighthouse.jonathansilverstein.us
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lighthouse-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lighthouse-frontend
                port:
                  number: 80
