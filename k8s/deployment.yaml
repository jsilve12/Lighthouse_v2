apiVersion: apps/v1
kind: Deployment
metadata:
  name: lighthouse-api
  namespace: lighthouse
  labels:
    app.kubernetes.io/name: lighthouse
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lighthouse
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lighthouse
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: lighthouse-api
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/personal-project-289714/lighthouse/api@sha256:dc356b02a5ec2582918f7968408eb14b2a937cffd5a3a30d9c9b05c6f5b70639
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: LIGHTHOUSE_DB_HOST
              value: localhost
            - name: LIGHTHOUSE_DB_PORT
              value: "5432"
            - name: LIGHTHOUSE_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: lighthouse-db-credentials
                  key: database
            - name: LIGHTHOUSE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: lighthouse-db-credentials
                  key: user
            - name: LIGHTHOUSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lighthouse-db-credentials
                  key: password
            - name: LIGHTHOUSE_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lighthouse-oauth-credentials
                  key: google_client_id
            - name: LIGHTHOUSE_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lighthouse-oauth-credentials
                  key: google_client_secret
            - name: LIGHTHOUSE_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lighthouse-oauth-credentials
                  key: jwt_secret_key
            - name: LIGHTHOUSE_ENVIRONMENT
              value: production
            - name: LIGHTHOUSE_BASE_URL
              value: https://lighthouse.jonathansilverstein.us
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - "--structured-logs"
            - "--private-ip"
            - "$(CONNECTION_NAME)"
          env:
            - name: CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: lighthouse-db-credentials
                  key: connection_name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
